services:
  neo4j:
    image: docker.io/neo4j:5-community
    network_mode: host
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  server:
    build: ./server
    network_mode: host
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      PORT: 8000
      JWT_SECRET: dev-secret
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
    depends_on:
      neo4j:
        condition: service_healthy

  ui:
    build: ./ui
    network_mode: host
    volumes:
      - ./ui:/app
      - /app/node_modules
    depends_on:
      - server

volumes:
  neo4j_data:
